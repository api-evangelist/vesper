name: Vesper Finance
description: Vesper Finance is a DeFi yield aggregator that enables users to deposit
  assets into managed pools where yield strategies automatically optimize returns
  across decentralized finance protocols. The platform provides REST APIs for querying
  pool performance metrics, APY data, strategy information, VSP token statistics,
  and historical value-locked data across Ethereum, Polygon, Avalanche, and Optimism.
