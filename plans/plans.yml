name: Vesper Finance API Plans
description: Vesper Finance provides open, public access to its REST API with no
  authentication requirements. The API is freely available for integration with DeFi
  applications, aggregators, and data dashboards.
plans:
  - name: Public Access
    description: Free and open access to all Vesper Finance REST API endpoints with
      no API key or authentication required. Suitable for developers, data analysts,
      aggregators, and DeFi protocol integrations.
    url: https://docs.vesper.finance/vesper-developers/vesper-developers-guide
    price: 0.00
    currency: USD
    unit: month
    rateLimits: []
    quotas: []
    features:
      - name: Pool Dashboard Data
        description: Access to GET /dashboard endpoint returning pool contracts, strategies,
          and rewards for all pools
      - name: Loan Rates
        description: Access to GET /loan-rates for 24-hour APY and APR data across
          all pools
      - name: Pool Details
        description: Access to GET /pools for complete pool metadata including fees,
          risk levels, and earning rates
      - name: Historical Data Points
        description: Access to GET /pools/:address/data-points for per-pool historical
          metrics over the past week
      - name: Values Locked
        description: Access to GET /values-locked for 30-day total value locked snapshots
          across all pools
      - name: VSP Statistics
        description: Access to GET /vsp-stats for VSP token price, supply, market
          cap, and distribution data
